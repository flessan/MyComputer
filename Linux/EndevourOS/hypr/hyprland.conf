# ==========================================
# HYPRLAND V10 (Caelestia Fixed & Internet OK)
# ==========================================

# --- MONITOR ---
monitor=eDP-1,preferred,auto,1

# --- ENVIRONMENT VARIABLES ---
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_SCALE,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = LANG,id_ID.UTF-8
env = LC_CTYPE,en_US.UTF-8
# Fix Ikon
env = GTK_ICON_THEME_NAME,Adwaita

# --- AUTOSTART (FIX Caelestia & Internet) ---
# 1. Wallpaper (Gunakan swww standar, file ~/car.gif)
exec-once = awww-daemon
exec-once = sleep 2 && awww img ~/car.gif

# 2. Caelestia (FIX: Perintah lengkap sesuai dokumentasimu)
exec-once = QML_IMPORT_PATH=$HOME/.config/quickshell/caelestia/build/qml quickshell -c caelestia

# 3. Waybar & Notifikasi
exec-once = waybar
exec-once = dunst

# 4. Internet / WiFi Tray (Agar status internet muncul)
exec-once = nm-applet --indicator

# 5. Lainnya
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle

# --- GENERAL ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
    
    # Warna Border: Pink to Teal
    col.active_border = rgba(ee99aaff) rgba(00ffccff) 45deg
    col.inactive_border = rgba(595959aa)
}

# --- INPUT ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        drag_lock = true
    }
}

# --- DECORATIONS ---
decoration {
    rounding = 10
    dim_inactive = true
    dim_strength = 0.2
    
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = true
        noise = 0.01
        contrast = 0.9
        brightness = 0.8
    }
}

# --- ANIMATIONS ---
animations {
    enabled = true
    
    # Kurva bezier kustom
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = fastSnap, 0.26, 0, 0.32, 1
    # Tambahkan ini untuk efek scroll yang lebih "kenyal" (elastic)
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 7, fastSnap, slide
    animation = windowsOut, 1, 5, default, slidefade
    animation = border, 1, 10, default
    animation = borderangle, 1, 30, linear, loop
    animation = fade, 1, 10, default
    
    # MODIFIKASI DI SINI:
    # Kita pakai 'myBezier' supaya pas pindah workspace ada efek mantul sedikit (overshoot)
    # Kecepatan 6 sudah pas, tapi kalau mau lebih instan coba angka 5
    animation = workspaces, 1, 6, myBezier, slidevert 
}

# --- KEYBINDINGS ---
 $mainMod = SUPER

# Apps
#bind = $mainMod, Q, exec, kitty
bind = $mainMod, Q, exec, konsole
bind = $mainMod, W, exec, firefox
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin # Menggunakan Dolphin
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, exec, rofi -show drun # Menu Aplikasi
bind = $mainMod, R, exec, killall waybar; waybar &

# Logout & Lock
bind = $mainMod, ESCAPE, exec, wlogout
bind = $mainMod, L, exec, hyprlock

# Grouping & Special
bind = $mainMod, G, togglegroup
bind = $mainMod, TAB, changegroupactive
bind = $mainMod, X, togglespecialworkspace, magic # FIX TULISAN (bukan togglespecial)

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, Tab, exec, rofi -show window

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll Workspace
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1
bind = alt, q, workspace, e+1
bind = alt, Tab, workspace, e-1

# Media & Volume
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
# Cukup satu tombol buat gonta-ganti (Toggle)
bind = CTRL SUPER, V, exec, ~/pindah_audio.sh

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshot
bind = $mainMod, PRINT, exec, grim - | swappy -f -
bind = $mainMod SHIFT, PRINT, exec, grim -g "$(slurp)" - | swappy -f -

# Mouse Move/Resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
